# ---------------------------------------------------------------------------
# Advisor thresholds (scenario_advisor niveaux 4-7).
# All values are initial tunables — override per project as needed.
# References: SME Mineral Processing Handbook (3rd ed.), Outotec best practices,
# typical gold-plant PFS/FS design.
# ---------------------------------------------------------------------------
advisor_thresholds:
  # Niveau 4 — Blockmodel / variabilité minerai
  bwi_cv_high:
    value: 0.30           # Tunable — CV(BWi) > 0.3 => HPGR recommended
    unit: "-"
    range: [0.15, 0.50]
    reference: "SME Handbook Ch. Comminution — hard-ore HPGR screening criterion"
  oxide_share_dual_circuit_pct:
    value: 20.0           # Tunable — oxide share > 20% => dual circuit
    unit: "%"
    range: [10.0, 40.0]
    reference: "Outotec — dual oxide/sulfide circuit break-even"
  low_grade_heap_g_t:
    value: 0.6            # Tunable — avg Au grade below this => consider heap leach
    unit: "g/t"
    range: [0.3, 1.0]
    reference: "Industry rule of thumb for heap-leach economics"
  heap_tonnage_ktpd:
    value: 30.0           # Tunable — paired with low_grade_heap_g_t
    unit: "ktpd"
    range: [10.0, 80.0]
    reference: "Large low-grade project heap-leach threshold"
  # Niveau 5 — Design / mass balance
  p80_target_tolerance_pct:
    value: 10.0           # Tunable — actual P80 within ±X% of target is acceptable
    unit: "%"
    range: [5.0, 25.0]
    reference: "Industry MB convergence tolerance"
  # Niveau 6 — Equipment / costs
  equipment_utilization_low_pct:
    value: 70.0           # Tunable — utilization below this => debottleneck
    unit: "%"
    range: [50.0, 85.0]
    reference: "Outotec — underutilization threshold"
  high_capex_revenue_ratio:
    value: 0.8            # Tunable — CAPEX / revenue > 0.8 => reduce CAPEX option
    unit: "-"
    range: [0.5, 1.2]
    reference: "Project economics rule of thumb"
  high_reagent_opex_usd_t:
    value: 3.0            # Tunable — reagent OPEX > $3/t ore => optimize
    unit: "$/t"
    range: [1.5, 8.0]
    reference: "Industry benchmark for NaCN + collectors"

# ---------------------------------------------------------------------------
# Plant design & simulation QA (MetPlant 2008 + SLA simulation best practices).
# ---------------------------------------------------------------------------
plant_design_thresholds:
  bwi_cv_variability:
    value: 0.30
    unit: "-"
    range: [0.15, 0.50]
    reference: "MetPlant 2008 — comminution variability triggers domain testwork"
  testwork_score_run_warn:
    value: 50.0
    unit: "%"
    range: [30.0, 70.0]
    reference: "SLA 2008 — GIGO guard before rigorous simulation"
  simulation_qa_min_fraction:
    value: 0.75
    unit: "-"
    range: [0.5, 0.95]
    reference: "SLA model lifecycle — stage fraction considered OK"
