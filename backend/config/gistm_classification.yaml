# GISTM Tailings Classification Matrix — Default values
#
# Synthesis aligned with GISTM (ICMM/UNEP/PRI 2020) + Canadian Dam Association
# (CDA 2019) + ANCOLD. Numerical FS thresholds are not explicit in GISTM itself
# (which mandates "site-specific design"); these defaults are a defensible
# starting point that MUST be validated by the project's Engineer of Record.
#
# Override per-project or per-jurisdiction by editing this file. Multi-référentiel
# (Canadian MAC, ANCOLD national variants) is deferred to a separate module.

classification:
  par_count:
    low:         {max: 0}
    significant: {min: 1, max: 10}
    high:        {min: 11, max: 100}
    very_high:   {min: 101, max: 1000}
    extreme:     {min: 1001}
  env_damage_class:
    low: [none]
    significant: [minor]
    high: [moderate]
    very_high: [major]
    extreme: [catastrophic]
  economic_damage_usd_m:
    low:         {max: 1}
    significant: {min: 1, max: 10}
    high:        {min: 10, max: 100}
    very_high:   {min: 100, max: 1000}
    extreme:     {min: 1000}
  critical_infra_downstream:
    floor_when_true: high

design_criteria:
  low:
    idf_yr: 100
    mde_yr: 475
    fs_static: 1.3
    fs_seismic: 1.0
    fs_post_liq: 1.0
    methods: [downstream, centreline, upstream]
    pga_threshold_g: null
  significant:
    idf_yr: 1000
    mde_yr: 2475
    fs_static: 1.4
    fs_seismic: 1.1
    fs_post_liq: 1.0
    methods: [downstream, centreline, upstream]
    pga_threshold_g: 0.10
  high:
    idf_yr: 5000
    mde_yr: 5000
    fs_static: 1.5
    fs_seismic: 1.2
    fs_post_liq: 1.1
    methods: [downstream, centreline]
    pga_threshold_g: 0.10
  very_high:
    idf_yr: 10000
    mde_yr: 10000
    fs_static: 1.5
    fs_seismic: 1.2
    fs_post_liq: 1.1
    methods: [downstream]
    pga_threshold_g: null
  extreme:
    idf_yr: 10000
    mde_yr: 10000
    fs_static: 1.5
    fs_seismic: 1.2
    fs_post_liq: 1.1
    methods: [downstream]
    pga_threshold_g: null
